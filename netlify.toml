# Syre Diamond Autos - Netlify Configuration
# https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  # No build command needed for static site
  command = "echo 'No build required - static site'"
  publish = "."

# Redirects for clean URLs
[[redirects]]
  from = "/vehicles"
  to = "/vehicles.html"
  status = 200

[[redirects]]
  from = "/contact"
  to = "/#contact"
  status = 200

[[redirects]]
  from = "/sell"
  to = "/#sell"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

# Force HTTPS
[[redirects]]
  from = "http://syrediamondautos.com/*"
  to = "https://syrediamondautos.com/:splat"
  status = 301
  force = true
